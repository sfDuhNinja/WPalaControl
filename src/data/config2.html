<form id="appForm">
    <div class="hairlineTop">
        <div class="subhead">Home automation</div>

        <div class="segmented">
            <button type="button" id="haOffBtn">Disabled</button>
            <button type="button" id="haMqttBtn">MQTT</button>
        </div>
        <input type="hidden" id="haproto" name="haproto" value="0">

        <div id="haFields" style="display:none;">
            <div class="grid2gap10" style="margin-bottom:14px;">
                <div>
                    <label class="formLabelSm" for="hahost">Broker host</label>
                    <input type="text" id="hahost" name="hahost" maxlength="64" class="fieldSm">
                </div>
                <div>
                    <label class="formLabelSm" for="hamport">Port</label>
                    <input type="number" id="hamport" name="hamport" min="1" max="65535" class="fieldSm">
                </div>
                <div>
                    <label class="formLabelSm" for="hamu">Username</label>
                    <input type="text" id="hamu" name="hamu" maxlength="32" class="fieldSm" placeholder="optional">
                </div>
                <div>
                    <label class="formLabelSm" for="hamp">Password</label>
                    <input type="password" id="hamp" name="hamp" maxlength="64" class="fieldSm" placeholder="optional">
                </div>
                <div>
                    <label class="formLabelSm" for="hamgbt">Base topic</label>
                    <input type="text" id="hamgbt" name="hamgbt" maxlength="64" class="fieldSm">
                </div>
                <div>
                    <label class="formLabelSm" for="haupperiod">Upload period (s)</label>
                    <input type="number" id="haupperiod" name="haupperiod" min="15" max="65535" class="fieldSm">
                </div>
            </div>

            <label class="formLabelSm" style="margin-bottom:8px;">Payload format</label>
            <div class="chipRow" id="mqttTypeChips">
                <button type="button" class="chip" data-val="0">Generic</button>
                <button type="button" class="chip" data-val="1">Generic JSON</button>
                <button type="button" class="chip" data-val="2">Categorized</button>
            </div>
            <input type="hidden" id="hamtype" name="hamtype" value="1">
            <div class="mono" id="mqttTypeHint" style="font-size:12px; color:var(--text-dim); margin-bottom:16px;"></div>

            <div class="rowBetween" style="padding:8px 0;">
                <span style="font-size:13.5px; color:var(--text-dim);">Home Assistant discovery</span>
                <input type="checkbox" id="hamhassde" name="hamhassde" class="toggleCheckbox">
            </div>
        </div>

        <button type="submit" class="btnPrimary" id="saveAppBtn" style="margin-top:16px;" disabled>Save module settings</button>
    </div>
</form>
<div id="appResult" style="margin-top:10px; font-size:13px;"></div>

<script>
    // qsp is substituted at build time by pio_pre_build_spa.py

    const mqttHints = {
        0: '{baseTopic}/T1 = "20.00" — raw values at root',
        1: '{baseTopic}/TMPS = {...} — JSON per category',
        2: '{baseTopic}/TMPS/T1 = "20.00" — raw values under category',
    };

    function setHaProto(val) {
        $(qsp + '#haproto').value = val;
        $(qsp + '#haOffBtn').classList.toggle('active', val == 0);
        $(qsp + '#haMqttBtn').classList.toggle('active', val == 1);
        $(qsp + '#haFields').style.display = (val == 1) ? '' : 'none';
    }
    $(qsp + '#haOffBtn').addEventListener('click', function () { setHaProto(0); });
    $(qsp + '#haMqttBtn').addEventListener('click', function () { setHaProto(1); });

    function setMqttType(val) {
        $(qsp + '#hamtype').value = val;
        $(qsp + '#mqttTypeChips').querySelectorAll('.chip').forEach(function (chip) {
            chip.classList.toggle('active', chip.dataset.val == val);
        });
        $(qsp + '#mqttTypeHint').textContent = mqttHints[val] || '';
    }
    $(qsp + '#mqttTypeChips').querySelectorAll('.chip').forEach(function (chip) {
        chip.addEventListener('click', function () { setMqttType(chip.dataset.val); });
    });

    $(qsp + '#appForm').addEventListener('submit', function (event) {
        event.preventDefault();
        $(qsp + '#appResult').innerHTML = 'Saving configuration…';
        post("/sc" + qsp[8],
            convertFormToJson($(qsp + '#appForm')),
            function () {
                $(qsp + '#appForm').style.display = 'none';
                $(qsp + '#appResult').innerHTML = '<b>Configuration saved successfully.</b> System is restarting now. Waiting for device… <span id="cd">0</span>s';
                redirectWhenReachable(location.origin, 30000);
            },
            function () {
                $(qsp + '#appResult').innerHTML = '<span style="color:var(--danger);"><b>Error</b></span> saving configuration.';
            }
        );
    });

    onSectionOpen('Config', function () {
        getJSON('/gc' + qsp[8],
            function (GC) {
                setHaProto(GC.haproto);
                $(qsp + '#hahost').value = GC.hahost;
                $(qsp + '#hamport').value = GC.hamport;
                $(qsp + '#hamu').value = GC.hamu;
                $(qsp + '#hamp').value = GC.hamp;
                $(qsp + '#hamgbt').value = GC.hamgbt;
                $(qsp + '#haupperiod').value = GC.haupperiod;
                setMqttType(GC.hamtype);
                $(qsp + '#hamhassde').checked = !!GC.hamhassde;

                $(qsp + '#saveAppBtn').disabled = false;
            },
            function () {
                $(qsp + '#appResult').innerHTML = '<span style="color:var(--danger);">Failed to load configuration</span>';
            }
        );
    });
</script>
