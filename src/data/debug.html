<div style="padding-top:12px;">
    <div class="debugLayout">
        <div class="debugCmdList" id="debugCmdList"></div>
        <div>
            <button class="linkBtn" id="debugClearBtn" style="margin-bottom:10px;">Clear output</button>
            <pre class="debugOutput" id="debugOutput">Select a command…</pre>
        </div>
    </div>
</div>

<script>
    // Unlike status2.html/config2.html this fragment isn't part of a merged group (registered
    // with an empty fragment_index in pio_pre_build_spa.py, same as fw.html), so there's no
    // qsp wrapper scoping - plain IDs are unique on the page already.

    // Every parameterless GET command the firmware understands (WPalaControl.cpp
    // executePalaCmdGet). HPAR/PARM are the only two that take a parameter, handled
    // separately below with their own inline input.
    const DEBUG_CMDS = [
        ['GET ALLS', 'All live data'],
        ['GET CHRD', 'Chrono schedule'],
        ['GET CNTR', 'Counters (ignitions, times, errors)'],
        ['GET DPRS', 'Differential pressure'],
        ['GET FAND', 'Fans'],
        ['GET IOPT', 'Digital inputs/outputs'],
        ['GET LABL', 'Device label'],
        ['GET MDVE', 'Board model/firmware/date'],
        ['GET SETP', 'Setpoint and eco mode'],
        ['GET STAT', 'Current status'],
        ['GET STDT', 'Full static data'],
        ['GET TIME', 'Stove clock'],
        ['GET TMPS', 'Temperatures T1-T5'],
        ['GET POWR', 'Power level and feeder'],
        ['GET SERN', 'Stove serial number'],
        ['BKP PARM JSON', 'All normal parameters'],
        ['BKP HPAR JSON', 'All hidden parameters'],
    ];

    let debugBusy = false;

    function debugSetBusy(busy) {
        debugBusy = busy;
        $('#debugCmdList').querySelectorAll('button').forEach(function (btn) { btn.disabled = busy; });
    }

    function debugRun(cmd) {
        if (debugBusy || !cmd) return;
        debugSetBusy(true);
        $('#debugOutput').textContent = cmd + '\n\nRunning…';
        // '+' for spaces, matching the convention the rest of the app already uses for this
        // endpoint (see status2.html / mqttCallback) rather than %20.
        fetch('/cgi-bin/sendmsg.lua?cmd=' + cmd.trim().replace(/ /g, '+'))
            .then(function (r) { return r.json(); })
            .then(function (json) { $('#debugOutput').textContent = cmd + '\n\n' + JSON.stringify(json, null, 2); })
            .catch(function (e) { $('#debugOutput').textContent = cmd + '\n\nError: ' + e.message; })
            .finally(function () { debugSetBusy(false); });
    }

    function debugParamRow(label, cmdPrefix, title) {
        const row = document.createElement('div');
        row.className = 'debugCmdParamRow';
        row.title = title;
        row.innerHTML = '<span>' + label + '</span>' +
            '<input type="number" min="0" class="field" style="margin:0;">' +
            '<button class="btnGhost">Run</button>';
        const input = row.querySelector('input');
        const btn = row.querySelector('button');
        btn.addEventListener('click', function () {
            if (input.value !== '') debugRun(cmdPrefix + ' ' + input.value);
        });
        input.addEventListener('keydown', function (e) { if (e.key === 'Enter') btn.click(); });
        return row;
    }

    function debugRenderList() {
        const list = $('#debugCmdList');
        list.innerHTML = '';
        DEBUG_CMDS.forEach(function (entry) {
            const [cmd, title] = entry;
            const btn = document.createElement('button');
            btn.className = 'btnGhost debugCmdBtn';
            btn.textContent = cmd;
            btn.title = title;
            btn.addEventListener('click', function () { debugRun(cmd); });
            list.appendChild(btn);
        });
        list.appendChild(debugParamRow('GET HPAR', 'GET HPAR', 'Hidden parameter by index'));
        list.appendChild(debugParamRow('GET PARM', 'GET PARM', 'Parameter by index'));
    }

    $('#debugClearBtn').addEventListener('click', function () {
        $('#debugOutput').textContent = 'Select a command…';
    });

    debugRenderList();
</script>
