<div style="padding-top:12px;">
    <div style="font-size:12.5px; color:var(--text-dim); margin-bottom:5px;">Current firmware</div>
    <div class="mono" id="fwCurrent" style="font-size:20px; font-weight:600;">v—</div>
</div>

<div class="hairlineTop">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <div class="subhead" style="margin-bottom:0;">Online update</div>
        <button class="btnGhost" id="fwCheckBtn">Check for updates</button>
    </div>

    <div id="fwBanner" class="banner" style="display:none;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
            <div id="fwBannerLabel" style="font-weight:600; font-size:13.5px;"></div>
            <button class="btnPrimary" id="fwInstallBtn" style="display:none; background:var(--success);">Install update</button>
        </div>
        <div style="font-size:13px; font-weight:500; margin-top:10px;" id="fwLatestTitle"></div>
        <div style="font-size:11.5px; color:var(--text-dim); margin-top:2px;" id="fwReleaseDate"></div>
        <ul id="fwSummary" style="margin:10px 0 0; padding-left:18px; font-size:12.5px; color:var(--text-dim); line-height:1.6;"></ul>
        <a id="fwReleaseUrl" href="#" target="_blank" rel="noopener" style="display:inline-block; margin-top:10px; font-size:12.5px; font-weight:500; text-decoration:none;">View release notes ↗</a>
    </div>

    <div id="fwProgressWrap" style="margin-top:16px; display:none;">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px;">
            <span>Installing…</span><span id="fwProgressPct">0%</span>
        </div>
        <div class="progressTrack">
            <div class="progressFill" id="fwProgressFill" style="width:0%;"></div>
        </div>
    </div>
    <div id="fwUpdateResult" style="margin-top:10px; font-size:13px;"></div>
</div>

<div style="padding-top:22px; margin-top:20px; border-top:1px solid var(--border);">
    <div style="font-size:12.5px; color:var(--text-dim); margin-bottom:10px;">Manual upload</div>
    <div class="dropzone" id="fwDropzone">Drop a .bin firmware file here, or click to browse</div>
    <input type="file" id="fwFileInput" accept=".bin" style="display:none;">
    <div id="fwUploadProgressWrap" style="margin-top:12px; display:none;">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px;">
            <span>Uploading…</span><span id="fwUploadPct">0%</span>
        </div>
        <div class="progressTrack">
            <div class="progressFill" id="fwUploadFill" style="width:0%;"></div>
        </div>
    </div>
    <div id="fwUploadResult" style="margin-top:10px; font-size:13px;"></div>
</div>

<script>
    // QuerySelector prefix is empty for fw (standalone template, no per-app numbering)

    let fwState = { current: '', latestVersion: '', checked: false };

    function compareVersions(a, b) {
        const ap = a.split('.').map(Number), bp = b.split('.').map(Number);
        for (let i = 0; i < Math.max(ap.length, bp.length); i++) {
            const x = ap[i] || 0, y = bp[i] || 0;
            if (x < y) return -1;
            if (x > y) return 1;
        }
        return 0;
    }

    function renderFwBanner() {
        const updateAvailable = fwState.checked && fwState.latestVersion && compareVersions(fwState.latestVersion, fwState.current) > 0;
        const banner = $('#fwBanner');
        if (!fwState.checked) { banner.style.display = 'none'; return; }
        banner.style.display = '';
        banner.style.background = updateAvailable ? 'var(--accent-soft)' : 'var(--success-soft)';
        $('#fwBannerLabel').style.color = updateAvailable ? 'var(--accent-text)' : 'var(--success)';
        $('#fwBannerLabel').textContent = (updateAvailable ? 'Update available' : 'Up to date') + (fwState.latestVersion ? (' · v' + fwState.latestVersion) : '');
        $('#fwInstallBtn').style.display = updateAvailable ? '' : 'none';
        $('#fwLatestTitle').textContent = fwState.latestTitle || '';
        $('#fwReleaseDate').textContent = fwState.releaseDate ? ('Released ' + fwState.releaseDate) : '';
        // Release notes are plain GitHub-flavored markdown; this renders every non-empty
        // line as one flat bullet, so strip markdown list markers and bold markers to avoid
        // a doubled "• - " look and stray "**" characters.
        const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const summaryLines = (fwState.summary || '')
            .split(/\r\n|\n/)
            .map(l => l.trim().replace(/^[-*]\s+/, '').replace(/\*\*/g, ''))
            .filter(Boolean);
        // notes text is untrusted-ish (it's whatever the release body says) - escape before
        // innerHTML, otherwise a literal "<tag>" in the text (e.g. describing an HTML element)
        // gets parsed as real markup instead of shown as text.
        $('#fwSummary').innerHTML = summaryLines.map(l => '<li>' + escapeHtml(l) + '</li>').join('');
        const link = $('#fwReleaseUrl');
        if (fwState.releaseUrl) { link.href = fwState.releaseUrl; link.style.display = 'inline-block'; }
        else link.style.display = 'none';
    }

    function checkForUpdates() {
        $('#fwCheckBtn').disabled = true;
        $('#fwCheckBtn').innerHTML = '<span class="spinner"></span> Checking…';
        getJSON('/glui',
            function (GUI) {
                fwState.current = GUI.installed_version;
                fwState.latestVersion = GUI.latest_version || '';
                fwState.latestTitle = GUI.title || '';
                fwState.releaseDate = GUI.release_date || '';
                fwState.summary = GUI.release_summary || '';
                fwState.releaseUrl = GUI.release_url || '';
                fwState.checked = true;
                $('#fwCurrent').textContent = 'v' + fwState.current;
                $('#fwCheckBtn').disabled = false;
                $('#fwCheckBtn').textContent = 'Check again';
                renderFwBanner();
            },
            function () {
                $('#fwCheckBtn').disabled = false;
                $('#fwCheckBtn').textContent = 'Check again';
                $('#fwUpdateResult').innerHTML = '<span style="color:var(--danger);">Failed to check for updates</span>';
            }
        );
    }
    $('#fwCheckBtn').addEventListener('click', checkForUpdates);

    $('#fwInstallBtn').addEventListener('click', function () {
        $('#fwInstallBtn').disabled = true;
        $('#fwProgressWrap').style.display = '';
        fetch('/update', { method: 'POST', body: fwState.latestVersion })
            .then(function (response) {
                if (!response.ok) return response.text().then(function (text) { throw new Error(text); });
                const reader = response.body.pipeThrough(new TextDecoderStream()).getReader();
                let chunkAccumulator = '', success = false, message = '';
                function processChunk(result) {
                    if (result.done) {
                        if (success) {
                            $('#fwProgressPct').textContent = 'Rebooting…';
                            $('#fwUpdateResult').innerHTML = 'Waiting for device… <span id="cd">0</span>s';
                            redirectWhenReachable(location.origin, 60000);
                        } else {
                            $('#fwUpdateResult').innerHTML = '<span style="color:var(--danger);"><b>Failed</b></span> (' + message + ')';
                            $('#fwInstallBtn').disabled = false;
                        }
                        return;
                    }
                    chunkAccumulator += result.value;
                    const chunks = chunkAccumulator.split('\n');
                    chunkAccumulator = chunks.pop();
                    chunks.forEach(function (chunk) {
                        if (chunk.startsWith('p:')) {
                            const raw = chunk.substring(2);
                            const fill = $('#fwProgressFill');
                            if (raw === '?') {
                                // download's Content-Length was unknown - can't show a real percentage
                                $('#fwProgressPct').textContent = 'Installing…';
                                fill.classList.add('indeterminate');
                            } else {
                                fill.classList.remove('indeterminate');
                                const pct = parseInt(raw);
                                $('#fwProgressPct').textContent = pct + '%';
                                fill.style.width = pct + '%';
                            }
                        }
                        else if (chunk.startsWith('s:')) success = chunk.substring(2) === 'true';
                        else if (chunk.startsWith('m:')) message = chunk.substring(2);
                    });
                    reader.read().then(processChunk);
                }
                reader.read().then(processChunk);
            })
            .catch(function (error) {
                $('#fwUpdateResult').innerHTML = '<span style="color:var(--danger);"><b>Failed</b></span> (' + error.message + ')';
                $('#fwInstallBtn').disabled = false;
            });
    });

    // ---- manual upload ----
    function validFilename(filename) {
        const model = document.querySelector("meta[name='description']").content;
        const esp32 = '(\\.esp32)?';
        const ver = '(\\.\\d+\\.\\d+\\.\\d+)?';
        const p = new RegExp(`^${model}${esp32}${ver}.*\\.bin$`, 'i');
        return p.test(filename);
    }

    function uploadFirmware(file) {
        if (!validFilename(file.name)) {
            const model = document.querySelector("meta[name='description']").content;
            alert(`This doesn't look like a valid firmware file for ${model} (expected something like ${model}.1.2.3.bin)`);
            return;
        }
        if (!confirm('Please do not power off the device during the update process.')) return;

        $('#fwDropzone').style.pointerEvents = 'none';
        $('#fwUploadProgressWrap').style.display = '';
        $('#fwUploadResult').innerHTML = '';

        const formData = new FormData();
        formData.append('fi', file);

        post('/fw', formData,
            function () {
                $('#fwUploadPct').textContent = 'Rebooting…';
                $('#fwUploadResult').innerHTML = 'Waiting for device… <span id="cd">0</span>s';
                redirectWhenReachable(location.origin, 60000);
            },
            function (responseText) {
                const reason = responseText || 'no response from device — it may have restarted or the connection timed out';
                $('#fwUploadResult').innerHTML = '<span style="color:var(--danger);"><b>Failed</b></span> (' + reason + ')';
                $('#fwDropzone').style.pointerEvents = '';
            },
            120000,
            function (evt) {
                if (evt.lengthComputable) {
                    const pct = Math.round((evt.loaded / evt.total) * 100);
                    $('#fwUploadPct').textContent = pct + '%';
                    $('#fwUploadFill').style.width = pct + '%';
                }
            }
        );
    }

    $('#fwDropzone').addEventListener('click', function () { $('#fwFileInput').click(); });
    $('#fwFileInput').addEventListener('change', function () {
        if (this.files[0]) uploadFirmware(this.files[0]);
    });
    $('#fwDropzone').addEventListener('dragover', function (e) { e.preventDefault(); });
    $('#fwDropzone').addEventListener('drop', function (e) {
        e.preventDefault();
        if (e.dataTransfer.files[0]) uploadFirmware(e.dataTransfer.files[0]);
    });

    // Runs on every page load, not gated behind opening the Firmware section:
    // does a live HTTPS request to GitHub, so it adds a bit of latency at load time.
    checkForUpdates();
</script>
